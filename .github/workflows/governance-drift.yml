name: Governance Drift

on:
  push:
    branches: [main]
    paths:
      - ".governance/**"
      - "AGENTS.base.md"
      - "AGENTS.md"
      - "PLAN.md"
      - "contract.yaml"
      - "governance/**"
  pull_request:
    branches: [main]
    paths:
      - ".governance/**"
      - "AGENTS.base.md"
      - "AGENTS.md"
      - "PLAN.md"
      - "contract.yaml"
      - "governance/**"
  workflow_dispatch:

jobs:
  governance-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          # This workflow validates the committed governance projection. The
          # authoritative submodule lives on an internal GitLab host and is
          # intentionally not cloned by GitHub-hosted runners.
          submodules: "false"

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Verify committed governance projection
        run: node scripts/check-governance-projection.mjs
